# Consistent fixture models shared by ALL example snippets, in BOTH languages.
#
# This is the single schema the example corpus is written against. The JS
# harness generates model classes from it via `js-bao-codegen-v2`; the Swift
# harness generates structs from it via `swift-bao-codegen` (the same TOML feeds
# both, exactly like the client's own cross-language E2E parity harness). Every
# model carries an explicit `class_name` so the two codegens emit identical
# names.
#
# Keep this set small but representative — it only needs to cover the operations
# the guides demonstrate (CRUD, query operators, sort/paginate, relations,
# aggregation, stringsets, upsert, sharing context).

[models.tasks]
class_name = "Task"

[models.tasks.fields.id]
type = "id"
auto_assign = true
indexed = true
required = true

[models.tasks.fields.title]
type = "string"
indexed = true
required = true

[models.tasks.fields.completed]
type = "boolean"
default = false

[models.tasks.fields.priority]
type = "number"
default = 0
indexed = true

[models.tasks.fields.dueDate]
type = "date"

[models.tasks.fields.category]
type = "string"
indexed = true

[models.tasks.fields.estimatedHours]
type = "number"

[models.tasks.fields.tags]
type = "stringset"
max_count = 10

[models.categories]
class_name = "Category"

[models.categories.fields.id]
type = "id"
auto_assign = true
indexed = true
required = true

[models.categories.fields.name]
type = "string"
indexed = true
required = true

[models.categories.fields.parentId]
type = "string"
indexed = true

[models.categories.fields.color]
type = "string"

[[models.categories.unique_constraints]]
name = "name_parentId"
fields = ["name", "parentId"]

[models.appUsers]
class_name = "AppUser"

[models.appUsers.fields.id]
type = "id"
auto_assign = true
indexed = true
required = true

[models.appUsers.fields.email]
type = "string"
indexed = true
unique = true
required = true

[models.appUsers.fields.name]
type = "string"

[models.posts]
class_name = "Post"

[models.posts.fields.id]
type = "id"
auto_assign = true
indexed = true
required = true

[models.posts.fields.title]
type = "string"
required = true

[models.posts.fields.authorId]
type = "string"
indexed = true

[models.posts.fields.tagIds]
type = "stringset"

[models.posts.fields.createdAt]
type = "date"
indexed = true

# Post refersTo Author (the back-reference traversed by post.author())
[models.posts.relationships.author]
type = "refersTo"
model = "authors"
related_id_field = "authorId"

[models.authors]
class_name = "Author"

[models.authors.fields.id]
type = "id"
auto_assign = true
indexed = true
required = true

[models.authors.fields.name]
type = "string"
required = true

# Author hasMany Posts (traversed by author.posts(), newest first)
[models.authors.relationships.posts]
type = "hasMany"
model = "posts"
related_id_field = "authorId"
order_by_field = "createdAt"
order_direction = "DESC"

[models.comments]
class_name = "Comment"

[models.comments.fields.id]
type = "id"
auto_assign = true
indexed = true
required = true

[models.comments.fields.postId]
type = "string"
indexed = true

[models.comments.fields.body]
type = "string"

[models.messages]
class_name = "Message"

[models.messages.fields.id]
type = "id"
auto_assign = true
indexed = true
required = true

[models.messages.fields.body]
type = "string"

[models.messages.fields.createdAt]
type = "date"
