# Automated documentation update workflow
# Triggered by repository_dispatch from submodule repos (js-bao, js-bao-wss, primitive-app-dev)
# Uses Claude Code Action to analyze changes and update docs, then creates a PR

name: Update Docs from Submodule Changes

on:
  repository_dispatch:
    types: [submodule-update]

  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      submodule:
        description: 'Submodule name (js-bao, js-bao-wss, or primitive-app-dev)'
        required: true
        type: choice
        options:
          - js-bao
          - js-bao-wss
          - primitive-app-dev
      test_mode:
        description: 'Test mode (skip actual submodule update)'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write
  id-token: write
  actions: read

jobs:
  update-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout primitive-docs
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.DOCS_REPO_PAT }}
          submodules: recursive
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Determine submodule and context
        id: context
        env:
          EVENT_NAME: ${{ github.event_name }}
          PAYLOAD_SUBMODULE: ${{ github.event.client_payload.submodule }}
          PAYLOAD_REF: ${{ github.event.client_payload.ref }}
          PAYLOAD_CHANGED_FILES: ${{ github.event.client_payload.changed_files }}
          PAYLOAD_COMMIT_MESSAGES: ${{ github.event.client_payload.commit_messages }}
          PAYLOAD_API_CHANGES: ${{ github.event.client_payload.api_changes }}
          PAYLOAD_COMPARE_URL: ${{ github.event.client_payload.compare_url }}
          PAYLOAD_PUSHER: ${{ github.event.client_payload.pusher }}
          INPUT_SUBMODULE: ${{ github.event.inputs.submodule }}
          INPUT_TEST_MODE: ${{ github.event.inputs.test_mode }}
          ACTOR: ${{ github.actor }}
        run: |
          # Handle both repository_dispatch and workflow_dispatch
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            SUBMODULE="$PAYLOAD_SUBMODULE"
            REF="$PAYLOAD_REF"
            CHANGED_FILES="$PAYLOAD_CHANGED_FILES"
            COMMIT_MESSAGES="$PAYLOAD_COMMIT_MESSAGES"
            API_CHANGES="$PAYLOAD_API_CHANGES"
            COMPARE_URL="$PAYLOAD_COMPARE_URL"
            PUSHER="$PAYLOAD_PUSHER"
            TEST_MODE="false"
          else
            SUBMODULE="$INPUT_SUBMODULE"
            REF="main"
            CHANGED_FILES="(manual trigger - no specific files)"
            COMMIT_MESSAGES="(manual trigger)"
            API_CHANGES="(manual trigger - review all recent changes)"
            COMPARE_URL=""
            PUSHER="$ACTOR"
            TEST_MODE="$INPUT_TEST_MODE"
          fi

          echo "submodule=$SUBMODULE" >> $GITHUB_OUTPUT
          echo "ref=$REF" >> $GITHUB_OUTPUT
          echo "compare_url=$COMPARE_URL" >> $GITHUB_OUTPUT
          echo "pusher=$PUSHER" >> $GITHUB_OUTPUT
          echo "test_mode=$TEST_MODE" >> $GITHUB_OUTPUT

          # Store multiline values
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "commit_messages<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MESSAGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "api_changes<<EOF" >> $GITHUB_OUTPUT
          echo "$API_CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Map submodule to relevant guide files and source paths
          case "$SUBMODULE" in
            "js-bao")
              RELEVANT_GUIDES="docs/getting-started/working-with-data.md"
              SOURCE_PATHS="library_repos/js-bao/src/"
              ;;
            "js-bao-wss")
              RELEVANT_GUIDES="docs/getting-started/understanding-documents.md docs/getting-started/other-services.md docs/getting-started/local-first-model.md"
              SOURCE_PATHS="library_repos/js-bao-wss/src/"
              ;;
            "primitive-app-dev")
              RELEVANT_GUIDES="docs/getting-started/template-app.md docs/getting-started/document-explorer.md docs/getting-started/test-harness.md"
              SOURCE_PATHS="library_repos/primitive-app-dev/primitive-app/src/ library_repos/primitive-app-dev/primitive-app-template/src/"
              ;;
            *)
              RELEVANT_GUIDES="docs/getting-started/"
              SOURCE_PATHS=""
              ;;
          esac

          echo "relevant_guides=$RELEVANT_GUIDES" >> $GITHUB_OUTPUT
          echo "source_paths=$SOURCE_PATHS" >> $GITHUB_OUTPUT

      - name: Update submodule to latest
        if: steps.context.outputs.test_mode != 'true'
        run: |
          cd library_repos/${{ steps.context.outputs.submodule }}
          git fetch origin main
          git checkout ${{ steps.context.outputs.ref }}
          cd ../..
          git add library_repos/${{ steps.context.outputs.submodule }}

      - name: Update documentation with Claude
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            ## Task: Update Documentation Based on Submodule Changes

            The **${{ steps.context.outputs.submodule }}** library has been updated with new changes.
            Your task is to review the changes and update the relevant documentation guides if needed.

            ### What Changed

            **Submodule:** ${{ steps.context.outputs.submodule }}
            **Commit:** ${{ steps.context.outputs.ref }}
            **Compare URL:** ${{ steps.context.outputs.compare_url }}

            **Changed Files:**
            ```
            ${{ steps.context.outputs.changed_files }}
            ```

            **Commit Messages:**
            ```
            ${{ steps.context.outputs.commit_messages }}
            ```

            **API Changes (exports, classes, interfaces, functions):**
            ```diff
            ${{ steps.context.outputs.api_changes }}
            ```

            ### Source Code Location

            The source code for this submodule is located at:
            ${{ steps.context.outputs.source_paths }}

            ### Documentation to Review

            The following guide files may need updates based on these changes:
            ${{ steps.context.outputs.relevant_guides }}

            Also check the guides in:
            - guides/latest/ (agent guides for the libraries)

            ### Instructions

            1. **Analyze the changes**: Look at the API changes and commit messages to understand what was modified.

            2. **Read the relevant guide files**: Check if any documentation needs to be updated based on:
               - New exported functions, classes, or types
               - Changed function signatures or parameters
               - Renamed or deprecated APIs
               - New features or capabilities
               - Bug fixes that affect documented behavior

            3. **Update documentation if needed**:
               - Update code examples if APIs changed
               - Add documentation for new features
               - Update or remove documentation for deprecated features
               - Fix any outdated information

            4. **Preserve documentation style**: Follow the existing style:
               - Use VitePress markdown features (:::tip, :::warning, etc.)
               - Include TypeScript code examples
               - Keep explanations concise but thorough
               - Maintain consistent heading structure

            5. **Write a summary**: After reviewing and making any changes, write a brief summary to `.claude-summary.md` with:
               - What changes you reviewed
               - What documentation updates you made (if any)
               - Why these changes were or weren't needed
               This summary will be included in the PR description.

            6. **Signal whether updates were made**:
               - If you made documentation changes, create a file `.claude-docs-updated` containing `true`
               - If no documentation changes were needed, do NOT create this file
               - This determines whether a PR will be created

            ### Important

            - **NEVER edit files in `docs/reference/`** - these are auto-generated from source code and will be overwritten
            - Only modify files in `docs/getting-started/` and `guides/latest/`
            - Focus on the narrative guides that explain concepts and usage patterns
            - **Only make changes that are directly relevant to the submodule update** - do not make unrelated edits or improvements
            - **It is perfectly fine to make no changes** - if the code changes don't affect documentation, just write a summary explaining why no updates were needed. Do not invent changes just to have something to commit.
          claude_args: |
            --allowedTools "Read,Edit,Write,Glob,Grep,Bash(pnpm docs:build),Bash(pnpm gen:reference)"

      - name: Read Claude summary and status
        id: summary
        run: |
          if [ -f ".claude-summary.md" ]; then
            echo "summary<<EOF" >> $GITHUB_OUTPUT
            cat .claude-summary.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            rm .claude-summary.md
          else
            echo "summary=No summary provided." >> $GITHUB_OUTPUT
          fi

          # Check if Claude indicated docs were updated
          if [ -f ".claude-docs-updated" ]; then
            echo "docs_updated=true" >> $GITHUB_OUTPUT
            rm .claude-docs-updated
          else
            echo "docs_updated=false" >> $GITHUB_OUTPUT
          fi

      - name: Regenerate reference documentation
        run: pnpm gen:reference

      - name: Build documentation
        run: pnpm exec vitepress build docs

      - name: Check for changes
        id: check_changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true' && steps.summary.outputs.docs_updated == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.DOCS_REPO_PAT }}
          commit-message: |
            docs: Update documentation for ${{ steps.context.outputs.submodule }} changes

            Automated update triggered by changes in ${{ steps.context.outputs.submodule }}.

            Compare: ${{ steps.context.outputs.compare_url }}
          branch: docs-update/${{ steps.context.outputs.submodule }}-${{ github.run_number }}
          delete-branch: true
          title: "docs: Update for ${{ steps.context.outputs.submodule }} changes"
          body: |
            ## Automated Documentation Update

            This PR was automatically generated in response to changes in the **${{ steps.context.outputs.submodule }}** submodule.

            ### Summary of Changes

            ${{ steps.summary.outputs.summary }}

            ### Trigger
            - **Submodule:** ${{ steps.context.outputs.submodule }}
            - **Commit:** `${{ steps.context.outputs.ref }}`
            - **Pushed by:** @${{ steps.context.outputs.pusher }}
            - **Compare:** ${{ steps.context.outputs.compare_url }}

            ### Changed Files in Submodule
            ```
            ${{ steps.context.outputs.changed_files }}
            ```

            ### Commit Messages
            ```
            ${{ steps.context.outputs.commit_messages }}
            ```

            ---

            **Please review the documentation changes and merge if appropriate.**

            > Generated by Claude Code Action
          labels: |
            documentation
            automated
          assignees: ${{ steps.context.outputs.pusher }}

      - name: Summary
        env:
          DOCS_UPDATED: ${{ steps.summary.outputs.docs_updated }}
          SUBMODULE: ${{ steps.context.outputs.submodule }}
          CLAUDE_SUMMARY: ${{ steps.summary.outputs.summary }}
        run: |
          if [ "$DOCS_UPDATED" = "true" ]; then
            echo "## Documentation Updated" >> $GITHUB_STEP_SUMMARY
            echo "A PR has been created with documentation updates for **$SUBMODULE**." >> $GITHUB_STEP_SUMMARY
          else
            echo "## No Documentation Changes Needed" >> $GITHUB_STEP_SUMMARY
            echo "Claude determined that the changes in **$SUBMODULE** did not require documentation updates." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Summary" >> $GITHUB_STEP_SUMMARY
            printf '%s\n' "$CLAUDE_SUMMARY" >> $GITHUB_STEP_SUMMARY
          fi
