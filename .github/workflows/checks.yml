# Drift gate for every PR and branch push: example parity, TS compile,
# rendered guides current, guides.json current, TOML examples valid, CLI
# invocations valid against the pinned primitive-admin.
# The Swift compile gate needs an Apple host (the vendored swift-client's
# yswift/UniFFI scaffold doesn't build on Linux), so it runs as a separate
# macOS job.

name: Checks

on:
  pull_request:
  push:
    branches-ignore:
      - main # main runs the same gate inside publish-docs.yml

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.DOCS_REPO_PAT }}
          fetch-depth: 0

      - name: Configure git auth for submodules
        run: git config --global url."https://x-access-token:${{ secrets.DOCS_REPO_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Initialize submodules (resilient)
        run: |
          git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | while read key sm_path; do
            name="${key#submodule.}"
            name="${name%.path}"
            pinned_sha=$(git ls-tree HEAD "$sm_path" | awk "{print \$3}")
            echo "::group::Submodule $name (pinned: ${pinned_sha:0:12})"

            git submodule init -- "$sm_path"
            if git submodule update --single-branch -- "$sm_path" 2>/dev/null; then
              echo "✓ Checked out pinned commit"
            else
              echo "⚠ Pinned commit $pinned_sha not found, cloning latest branch HEAD"
              branch=$(git config -f .gitmodules "submodule.${name}.branch" || echo "main")
              url=$(git config -f .gitmodules "submodule.${name}.url")
              rm -rf "$sm_path"
              git clone --depth 1 --single-branch --branch "$branch" "$url" "$sm_path"
              echo "✓ Checked out latest $branch"
            fi

            echo "::endgroup::"
          done

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      # On the next channel the TS-compile and CLI gates read the submodule
      # source (scripts/channel.mjs) — build it first. Production reads the
      # installed pinned packages and skips this.
      - name: Build source packages (next channel)
        run: |
          channel=$(node -p "JSON.parse(require('fs').readFileSync('docs-sources.json','utf8')).channel ?? 'production'")
          echo "docs channel: $channel"
          if [ "$channel" = "next" ]; then pnpm build:source-packages; fi

      - name: Check examples, TOML, and CLI invocations
        run: pnpm check:examples

      - name: Build documentation
        run: pnpm docs:build:ci

  swift-compile:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.DOCS_REPO_PAT }}
          fetch-depth: 0

      - name: Configure git auth for submodules
        run: git config --global url."https://x-access-token:${{ secrets.DOCS_REPO_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Initialize submodules (resilient)
        run: |
          git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | while read key sm_path; do
            name="${key#submodule.}"
            name="${name%.path}"
            pinned_sha=$(git ls-tree HEAD "$sm_path" | awk "{print \$3}")
            echo "::group::Submodule $name (pinned: ${pinned_sha:0:12})"

            git submodule init -- "$sm_path"
            if git submodule update --single-branch -- "$sm_path" 2>/dev/null; then
              echo "✓ Checked out pinned commit"
            else
              echo "⚠ Pinned commit $pinned_sha not found, cloning latest branch HEAD"
              branch=$(git config -f .gitmodules "submodule.${name}.branch" || echo "main")
              url=$(git config -f .gitmodules "submodule.${name}.url")
              rm -rf "$sm_path"
              git clone --depth 1 --single-branch --branch "$branch" "$url" "$sm_path"
              echo "✓ Checked out latest $branch"
            fi

            echo "::endgroup::"
          done

      # The vendored swift-client needs a current toolchain — the image's
      # default Xcode hits an SPM "redefinition of module 'CTOML'" bug fixed
      # in newer Swift.
      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Swift version
        run: swift --version

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      # See the check job — the TS half of this gate is channel-aware too.
      - name: Build source packages (next channel)
        run: |
          channel=$(node -p "JSON.parse(require('fs').readFileSync('docs-sources.json','utf8')).channel ?? 'production'")
          echo "docs channel: $channel"
          if [ "$channel" = "next" ]; then pnpm build:source-packages; fi

      - name: Compile examples (TS + Swift)
        run: pnpm compile:examples
