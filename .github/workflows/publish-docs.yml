# Publish documentation to GitHub Pages when changes are merged to main

name: Publish Docs

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.DOCS_REPO_PAT }}
          fetch-depth: 0

      - name: Configure git auth for submodules
        run: git config --global url."https://x-access-token:${{ secrets.DOCS_REPO_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Initialize submodules (resilient)
        run: |
          # Parse .gitmodules directly (git submodule foreach only works on already-checked-out submodules)
          git config -f .gitmodules --get-regexp '^submodule\..*\.path$' | while read key sm_path; do
            name="${key#submodule.}"
            name="${name%.path}"
            pinned_sha=$(git ls-tree HEAD "$sm_path" | awk "{print \$3}")
            echo "::group::Submodule $name (pinned: ${pinned_sha:0:12})"

            git submodule init -- "$sm_path"
            if git submodule update --single-branch -- "$sm_path" 2>/dev/null; then
              echo "✓ Checked out pinned commit"
            else
              echo "⚠ Pinned commit $pinned_sha not found, cloning latest branch HEAD"
              branch=$(git config -f .gitmodules "submodule.${name}.branch" || echo "main")
              url=$(git config -f .gitmodules "submodule.${name}.url")
              rm -rf "$sm_path"
              git clone --depth 1 --single-branch --branch "$branch" "$url" "$sm_path"
              echo "✓ Checked out latest $branch"
            fi

            echo "::endgroup::"
          done

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      # main is the published channel: it must always describe the released
      # platform. A "next" stamp reaching main means a bad publish merge
      # (docs-publish-release restamps with --channel production).
      - name: Verify production channel
        run: |
          channel=$(node -p "JSON.parse(require('fs').readFileSync('docs-sources.json','utf8')).channel ?? 'production'")
          if [ "$channel" != "production" ]; then
            echo "::error::docs-sources.json declares channel '$channel' — main must be on the production channel"
            exit 1
          fi

      # Drift gate: example parity, TS compile (the Swift compile gate needs
      # an Apple host and is skipped here — the Checks workflow's macOS job
      # covers it pre-merge), rendered guides current, guides.json current,
      # TOML examples valid, CLI invocations valid against primitive-admin.
      - name: Check examples, TOML, and CLI invocations
        run: pnpm check:examples

      - name: Build documentation
        run: pnpm docs:build:ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Publish to gh-pages
        run: pnpm docs:publish
