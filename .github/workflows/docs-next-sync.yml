# Docs next-sync (agent automation)
#
# Receives the `nightly-release` repository_dispatch that the library repos
# (js-bao-wss, …) fire once per night, and runs the project's docs-next-sync
# skill with the Claude Code CLI to true the docs on the `next` branch against
# the library main tips. The result is opened as a pull request into `next` for
# human review — this workflow never merges.
#
# The nightly cadence deliberately supersedes the old per-commit trigger: the
# skill batches a whole day of library commits into one truing pass rather than
# firing on every push. Production releases are a separate tier — they trigger
# `docs-publish-release` via receive-production-release.yml, not this workflow.
#
# INDIVIDUAL DELTA PRs, one per night. Each run opens its own PR on a fresh
# per-run branch (`docs-next-sync/auto-<date>-<run>`), covering ONLY the
# library window since the last attempt — never a re-derivation of earlier
# unmerged PRs' work (the old rolling-superset design re-trued the whole
# window every night, which multiplied cost while a PR sat unmerged).
#
# The scan step (below) picks the baseline: the stamp of the NEWEST OPEN sync
# PR if one exists (so we only pay for a Claude run when the tips moved past
# the last attempt), else next's merged stamp. That baseline stamp is left in
# place for the agent too — its Step 1 scan then surfaces exactly the delta
# window. A PR closed UNMERGED (rejected) doesn't count as a baseline: its
# window gets re-derived by the next run.
#
# Consequence: sync PRs form an oldest-first chain — a newer PR does NOT
# contain an older one's content, and consecutive PRs both move the submodule
# pin + stamp, so they conflict by construction. docs-pr-sweep merges them
# oldest-target-first, rebasing each onto the updated next (see that skill's
# sync-PR handling). Merging promptly keeps the queue shallow.
#
# NOTE: repository_dispatch only triggers workflows that live on the default
# branch (main), so this file must stay on main even though the work it does
# targets `next`.
#
# Secrets used (already configured in this repo):
#   ANTHROPIC_API_KEY — Claude Code CLI auth
#   DOCS_REPO_PAT     — checkout + private submodule auth + `gh` (skill triage,
#                       and filing parity-gap issues in the library repos) +
#                       opening the PR. For issue filing the PAT must carry
#                       issues:write on the library repos (e.g. js-bao-wss).
#   GITHUB_TOKEN      — fallback token

name: Docs Next-Sync (agent)

on:
  repository_dispatch:
    types: [nightly-release]

  # Manual trigger for testing / on-demand runs.
  workflow_dispatch:
    inputs:
      submodule:
        description: 'Submodule that changed (context only; the skill triages all)'
        required: false
        type: choice
        default: js-bao-wss
        options:
          - js-bao-wss
          - primitive-app-dev
          - swift-primitive-app-dev
      force:
        description: 'Run the agent even if the scan finds no new commits (testing)'
        required: false
        type: boolean
        default: false

# One truing pass at a time: the skill moves submodule pins and restamps, so
# concurrent runs would clobber each other. Queue rather than cancel.
concurrency:
  group: docs-next-sync
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  next-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout primitive-docs (next)
        uses: actions/checkout@v5
        with:
          ref: next
          token: ${{ secrets.DOCS_REPO_PAT }}
          fetch-depth: 0

      - name: Configure git auth for private submodules
        run: |
          git config --global url."https://x-access-token:${{ secrets.DOCS_REPO_PAT }}@github.com/".insteadOf "https://github.com/"
          git config --global user.email "docs-bot@primitivelabs.com"
          git config --global user.name "primitive-docs-bot"

      - name: Initialize submodules at their pinned SHAs
        # Pinned (not tip) on purpose: the skill's --changes scan reads the
        # stamped-commit→origin/main diff, then fast-forwards to tip itself.
        run: git submodule update --init --recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build context from dispatch payload
        # The dispatch is fired by js-bao-wss's notify-docs-on-release.yml when a
        # `release:nightly` issue is marked `status:deployed`. It forwards that
        # issue's number/url/body — the body's "What shipped" PR list is a useful
        # hint, but the scan below re-derives the authoritative diff regardless.
        id: ctx
        env:
          EVENT_NAME: ${{ github.event_name }}
          P_SUBMODULE: ${{ github.event.client_payload.submodule }}
          P_ISSUE: ${{ github.event.client_payload.source_issue }}
          P_URL: ${{ github.event.client_payload.source_url }}
          P_NOTES: ${{ github.event.client_payload.release_notes }}
          I_SUBMODULE: ${{ github.event.inputs.submodule }}
        run: |
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            SUBMODULE="${P_SUBMODULE:-js-bao-wss}"; ISSUE="$P_ISSUE"; URL="$P_URL"; NOTES="$P_NOTES"
          else
            SUBMODULE="$I_SUBMODULE"; ISSUE="(manual run)"; URL=""; NOTES="(manual run)"
          fi
          {
            echo "submodule=$SUBMODULE"
            echo "issue=$ISSUE"
            echo "url=$URL"
            echo "date=$(date -u +%F)"
            # Fresh branch per run → one individual PR per nightly pass.
            echo "branch=docs-next-sync/auto-$(date -u +%Y%m%d)-r${GITHUB_RUN_NUMBER}"
            echo "notes<<EOF"; echo "$NOTES"; echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Scan for documentable changes since the last stamp
        # Cheap, deterministic gate: only pay for a Claude run when the library
        # tips actually moved past what the docs were last trued against. Keeps
        # no-op dispatches (and manual re-tests) to seconds instead of minutes.
        id: scan
        env:
          GH_TOKEN: ${{ secrets.DOCS_REPO_PAT }}
        run: |
          git submodule foreach 'git fetch -q origin || true' || true

          # Baseline selection. By default the scan reads next's docs-sources.json
          # (the last MERGED stamp). But if sync PRs are still open, the newest
          # one's stamp is the last ATTEMPT — overlay it so this pass scans (and
          # the agent trues) only the window nobody has attempted yet. The
          # overlay is deliberately left in place for the agent step: its Step 1
          # scan then surfaces exactly the delta window, making tonight's PR an
          # individual delta on top of the open chain, not a re-derivation of
          # it. Only OPEN PRs count — a PR closed unmerged must have its window
          # re-derived by the next run.
          BASELINE="next (last merged stamp)"
          PR_HEAD="$(gh pr list --base next --state open --json headRefName,createdAt \
            --jq '[.[] | select(.headRefName | startswith("docs-next-sync/auto"))] | sort_by(.createdAt) | last | .headRefName // empty' 2>/dev/null || true)"
          if [ -n "$PR_HEAD" ] \
             && git fetch -q origin "$PR_HEAD" 2>/dev/null \
             && git show "FETCH_HEAD:docs-sources.json" > /tmp/pr-sources.json 2>/dev/null; then
            cp /tmp/pr-sources.json docs-sources.json
            BASELINE="newest open sync PR branch $PR_HEAD (last attempt)"
          fi
          echo "Scan baseline: $BASELINE" | tee -a "$GITHUB_STEP_SUMMARY"

          node scripts/stamp-sources.mjs --changes | tee /tmp/scan.txt || true

          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "Forced run — exercising the agent path regardless of the scan." | tee -a "$GITHUB_STEP_SUMMARY"
            echo "has_work=true" >> "$GITHUB_OUTPUT"
          elif grep -qE '\([1-9][0-9]* commit' /tmp/scan.txt; then
            echo "has_work=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_work=false" >> "$GITHUB_OUTPUT"
            # Leave the tree clean when we stop here (the overlay dirtied it).
            git checkout -- docs-sources.json
            echo "No library commits since the last attempt — nothing new to true." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Run docs-next-sync with Claude Code CLI
        if: steps.scan.outputs.has_work == 'true'
        id: claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # The skill's triage runs `gh pr view/diff` against the (private)
          # library repos; gh reads GH_TOKEN.
          GH_TOKEN: ${{ secrets.DOCS_REPO_PAT }}
          SUBMODULE: ${{ steps.ctx.outputs.submodule }}
          ISSUE: ${{ steps.ctx.outputs.issue }}
          URL: ${{ steps.ctx.outputs.url }}
          NOTES: ${{ steps.ctx.outputs.notes }}
        run: |
          # Pinned: a bad CLI release must not break the nightly tier. Bump deliberately.
          npm install -g @anthropic-ai/claude-code@2.1.199

          # Static instructions (quoted heredoc → no shell interpolation).
          cat > /tmp/prompt.txt <<'PROMPT'
          You are running UNATTENDED in CI on the `next` branch of primitive-docs.

          Your job: use the project's docs-next-sync skill to true the
          documentation against the library main tips, then leave the result for
          a human-reviewed pull request. Begin now by invoking the
          docs-next-sync skill (the `/docs-next-sync` command) and carry it to
          completion.

          The skill's "Unattended mode (CI)" section governs this run — read it
          first and follow it exactly. Hard boundaries (the skill section
          elaborates; these are absolute):
          - Do NOT run `git commit`, `git push`, `git checkout -b`, `git merge`,
            or `gh pr create`/`gh pr merge`. Leave every change in the working
            tree; the workflow opens the pull request. (The skill's Step 0.5
            main→next drain never runs here.)
          - Non-interactive: NEVER ask a question or wait for input — draft and
            flag, don't defer.
          - Drive the gates to GREEN. If a failure has no mechanical fix, mark
            the run blocked in the report rather than claiming a pass — the
            workflow opens a blocked run's PR as a draft.
          - FILE parity/platform-gap issues (never close any); include a
            `Fixes #NN` line in the report for every open docs issue this pass
            resolves — they auto-close when the PR merges.
          - Finish by writing your complete disposition report to
            `.docs-next-sync-report.md` at the repo root, in the format the
            skill's unattended section specifies. Its FIRST line MUST be
            `SYNC_STATUS: ready` or `SYNC_STATUS: blocked — <reason>`. If the
            pass made no doc changes, write `SYNC_STATUS: ready`, say so, and
            leave the tree clean: reset the submodules AND restore the seeded
            baseline (`git checkout -- docs-sources.json`).
          PROMPT

          # Append the (untrusted) payload context as plain data.
          {
            echo
            echo "Triggering nightly-release context (a hint only; the skill re-derives the authoritative diff):"
            echo "- Submodule: ${SUBMODULE:-js-bao-wss}"
            echo "- Source release issue: ${SUBMODULE:-js-bao-wss}#${ISSUE:-unknown} ${URL:-}"
            echo "- Release report (\"What shipped\" etc.):"
            echo "${NOTES:-(none)}"
          } >> /tmp/prompt.txt

          # Sonnet, not Opus: the nightly is deliberately scoped to the changed
          # window (no whole-set audit — that deep pass runs at publish time in
          # receive-production-release.yml, which stays on Opus). The gates
          # enforce correctness mechanically and a human reviews the PR, so
          # Sonnet's cost profile fits the nightly cadence.
          set +e
          timeout 60m claude -p "$(cat /tmp/prompt.txt)" \
            --model sonnet \
            --permission-mode bypassPermissions \
            --output-format json \
            > /tmp/claude_out.json 2> /tmp/claude_err.log
          code=$?
          set -e

          echo "claude exit code: $code"
          echo "----- stderr (tail) -----"; tail -40 /tmp/claude_err.log || true
          if jq -e . /tmp/claude_out.json >/dev/null 2>&1; then
            echo "----- run stats -----"
            jq -r '"is_error=\(.is_error)  num_turns=\(.num_turns)  cost_usd=\(.total_cost_usd)  duration_ms=\(.duration_ms)"' /tmp/claude_out.json || true
            echo "::group::Agent final message (.result)"
            jq -r '.result // "(no result field)"' /tmp/claude_out.json || true
            echo "::endgroup::"
          else
            echo "----- raw stdout (tail) -----"; tail -40 /tmp/claude_out.json || true
          fi

          if [ "$code" -ne 0 ]; then
            echo "::error::Claude Code CLI exited $code"
            exit "$code"
          fi
          if jq -e '.is_error == true' /tmp/claude_out.json >/dev/null 2>&1; then
            echo "::error::Claude reported is_error=true"
            exit 1
          fi

      - name: Read agent report
        if: steps.scan.outputs.has_work == 'true'
        id: report
        run: |
          if [ -f .docs-next-sync-report.md ]; then
            echo "::group::Disposition report (.docs-next-sync-report.md)"
            cat .docs-next-sync-report.md
            echo "::endgroup::"
            # SYNC_STATUS drives the PR's draft state: anything but a clean
            # `ready` opens as a draft so a best-effort tree can't be mistaken
            # for a certified-green pass.
            STATUS="$(grep -m1 '^SYNC_STATUS:' .docs-next-sync-report.md | sed 's/^SYNC_STATUS:[[:space:]]*//' | awk '{print $1}')"
            echo "status=${STATUS:-blocked}" >> "$GITHUB_OUTPUT"
            { echo "body<<REPORT_EOF"; cat .docs-next-sync-report.md; echo "REPORT_EOF"; } >> "$GITHUB_OUTPUT"
            rm -f .docs-next-sync-report.md
          else
            echo "No .docs-next-sync-report.md was written by the agent — see the agent final message above."
            echo "status=blocked" >> "$GITHUB_OUTPUT"
            echo "body=The agent produced no report file. Review the run logs (agent final message)." >> "$GITHUB_OUTPUT"
          fi

      - name: Detect changes
        if: steps.scan.outputs.has_work == 'true'
        id: diff
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request into next
        if: steps.scan.outputs.has_work == 'true' && steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.DOCS_REPO_PAT }}
          base: next
          # FIXED branch (no run number): rolling PR. If a prior pass is still
          # un-merged this force-pushes the same branch and updates that one PR in
          # place instead of opening a second, overlapping one. The branch is
          # recreated from `next` each run, so every update is a complete superset
          # — never a chain. delete-branch:false keeps the branch alive between
          # runs so the scan step above can read its stamp as the baseline.
          # Fresh branch per run → one individual PR per nightly pass; the
          # branch is deleted on merge (the scan keys off OPEN PRs, not
          # branches).
          branch: ${{ steps.ctx.outputs.branch }}
          delete-branch: true
          # Blocked runs open as a draft so a best-effort tree is never
          # mistaken for a certified-green pass.
          draft: ${{ steps.report.outputs.status != 'ready' }}
          commit-message: |
            docs-next-sync: true next against ${{ steps.ctx.outputs.submodule }} (automated)
          title: "docs-next-sync: ${{ steps.ctx.outputs.submodule }} changes (automated, ${{ steps.ctx.outputs.date }})"
          body: |
            Automated `docs-next-sync` pass against the library main tips, triggered by the nightly release ${{ steps.ctx.outputs.submodule }}#${{ steps.ctx.outputs.issue }}.

            ${{ steps.report.outputs.status != 'ready' && '> ⚠️ **Blocked / best-effort.** The unattended pass could not certify green gates — see the SYNC_STATUS line in the report below. Resolve before merging.' || '' }}

            > **Delta PR.** This PR covers only the library window since the previous sync PR (or since the last merge, if none is open) — it does not contain earlier open sync PRs' content. Merge sync PRs **oldest first**; consecutive ones conflict on the stamp/submodule pin by construction, and `docs-pr-sweep` knows how to rebase and land the chain.

            ${{ steps.report.outputs.body }}

            ---
            Review the doc changes and the disposition above, then merge into `next`. Publishing to `main` happens separately at a production release.

            > Generated unattended by the Claude Code CLI. Verify facts against source before merging.

      - name: Run summary
        if: always()
        run: |
          if [ "${{ steps.scan.outputs.has_work }}" != "true" ]; then
            echo "## docs-next-sync: nothing to do (no new library commits)" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
            echo "## docs-next-sync opened a PR into \`next\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## docs-next-sync: triaged changes, no doc edits needed" >> "$GITHUB_STEP_SUMMARY"
          fi
