# Docs next-sync (agent automation)
#
# Receives the `nightly-release` repository_dispatch that the library repos
# (js-bao-wss, …) fire once per night, and runs the project's docs-next-sync
# skill with the Claude Code CLI to true the docs on the `next` branch against
# the library main tips. The result is opened as a pull request into `next` for
# human review — this workflow never merges.
#
# The nightly cadence deliberately supersedes the old per-commit trigger: the
# skill batches a whole day of library commits into one truing pass rather than
# firing on every push. Production releases are a separate tier — they trigger
# `docs-publish-release` via receive-production-release.yml, not this workflow.
#
# NOTE: repository_dispatch only triggers workflows that live on the default
# branch (main), so this file must stay on main even though the work it does
# targets `next`.
#
# Secrets used (already configured in this repo):
#   ANTHROPIC_API_KEY — Claude Code CLI auth
#   DOCS_REPO_PAT     — checkout + private submodule auth + `gh` (skill triage,
#                       and filing parity-gap issues in the library repos) +
#                       opening the PR. For issue filing the PAT must carry
#                       issues:write on the library repos (e.g. js-bao-wss).
#   GITHUB_TOKEN      — fallback token

name: Docs Next-Sync (agent)

on:
  repository_dispatch:
    types: [nightly-release]

  # Manual trigger for testing / on-demand runs.
  workflow_dispatch:
    inputs:
      submodule:
        description: 'Submodule that changed (context only; the skill triages all)'
        required: false
        type: choice
        default: js-bao-wss
        options:
          - js-bao-wss
          - primitive-app-dev
          - swift-primitive-app-dev
      force:
        description: 'Run the agent even if the scan finds no new commits (testing)'
        required: false
        type: boolean
        default: false

# One truing pass at a time: the skill moves submodule pins and restamps, so
# concurrent runs would clobber each other. Queue rather than cancel.
concurrency:
  group: docs-next-sync
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  next-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout primitive-docs (next)
        uses: actions/checkout@v5
        with:
          ref: next
          token: ${{ secrets.DOCS_REPO_PAT }}
          fetch-depth: 0

      - name: Configure git auth for private submodules
        run: |
          git config --global url."https://x-access-token:${{ secrets.DOCS_REPO_PAT }}@github.com/".insteadOf "https://github.com/"
          git config --global user.email "docs-bot@primitivelabs.com"
          git config --global user.name "primitive-docs-bot"

      - name: Initialize submodules at their pinned SHAs
        # Pinned (not tip) on purpose: the skill's --changes scan reads the
        # stamped-commit→origin/main diff, then fast-forwards to tip itself.
        run: git submodule update --init --recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build context from dispatch payload
        # The dispatch is fired by js-bao-wss's notify-docs-on-release.yml when a
        # `release:nightly` issue is marked `status:deployed`. It forwards that
        # issue's number/url/body — the body's "What shipped" PR list is a useful
        # hint, but the scan below re-derives the authoritative diff regardless.
        id: ctx
        env:
          EVENT_NAME: ${{ github.event_name }}
          P_SUBMODULE: ${{ github.event.client_payload.submodule }}
          P_ISSUE: ${{ github.event.client_payload.source_issue }}
          P_URL: ${{ github.event.client_payload.source_url }}
          P_NOTES: ${{ github.event.client_payload.release_notes }}
          I_SUBMODULE: ${{ github.event.inputs.submodule }}
        run: |
          if [ "$EVENT_NAME" = "repository_dispatch" ]; then
            SUBMODULE="${P_SUBMODULE:-js-bao-wss}"; ISSUE="$P_ISSUE"; URL="$P_URL"; NOTES="$P_NOTES"
          else
            SUBMODULE="$I_SUBMODULE"; ISSUE="(manual run)"; URL=""; NOTES="(manual run)"
          fi
          {
            echo "submodule=$SUBMODULE"
            echo "issue=$ISSUE"
            echo "url=$URL"
            echo "notes<<EOF"; echo "$NOTES"; echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Scan for documentable changes since the last stamp
        # Cheap, deterministic gate: only pay for a Claude run when the library
        # tips actually moved past what the docs were last trued against. Keeps
        # no-op dispatches (and manual re-tests) to seconds instead of minutes.
        id: scan
        run: |
          git submodule foreach 'git fetch -q origin || true' || true
          node scripts/stamp-sources.mjs --changes | tee /tmp/scan.txt || true
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "Forced run — exercising the agent path regardless of the scan." | tee -a "$GITHUB_STEP_SUMMARY"
            echo "has_work=true" >> "$GITHUB_OUTPUT"
          elif grep -qE '\([1-9][0-9]* commit' /tmp/scan.txt; then
            echo "has_work=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_work=false" >> "$GITHUB_OUTPUT"
            echo "No library commits since the last stamp — nothing to true." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Run docs-next-sync with Claude Code CLI
        if: steps.scan.outputs.has_work == 'true'
        id: claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # The skill's triage runs `gh pr view/diff` against the (private)
          # library repos; gh reads GH_TOKEN.
          GH_TOKEN: ${{ secrets.DOCS_REPO_PAT }}
          SUBMODULE: ${{ steps.ctx.outputs.submodule }}
          ISSUE: ${{ steps.ctx.outputs.issue }}
          URL: ${{ steps.ctx.outputs.url }}
          NOTES: ${{ steps.ctx.outputs.notes }}
        run: |
          npm install -g @anthropic-ai/claude-code

          # Static instructions (quoted heredoc → no shell interpolation).
          cat > /tmp/prompt.txt <<'PROMPT'
          You are running UNATTENDED in CI on the `next` branch of primitive-docs.

          Your job: use the project's docs-next-sync skill to true the
          documentation against the library main tips, then leave the result for
          a human-reviewed pull request. Begin now by invoking the
          docs-next-sync skill (the `/docs-next-sync` command) and carry it to
          completion under the rules below.

          CRITICAL unattended-run rules:
          - Non-interactive: NEVER ask a question or wait for input. The skill's
            posture is to DRAFT changes, not defer them — when it would normally
            escalate, make the change and FLAG it in your report rather than
            skipping it:
              * New capability/section: draft it, strongly preferring an existing
                page/guide section; only add a new page if it genuinely won't fit.
                Call out any larger change (new page, big restructure, content
                removal) prominently in the report for human review.
              * A genuinely ambiguous editorial call with no defensible answer:
                pick the most conservative reasonable option and note it.
            Every drafted change must still be source-true: verify each fact
            against the submodule source first (never trust PR summaries).
          - Do the full truing: triage every changed commit AND the open docs
            issue tracker, update human docs AND the matching agent guides, run
            `pnpm render:guides`, restamp, and run the gates (`pnpm check:examples`,
            `npx vitepress build docs`). Drive the gates to GREEN — a failing
            compile gate is a stale callsite to fix, not a result to report.
          - FILE issues for parity/platform gaps and library bugs, per
            `.claude/ISSUE_FILING.md` (which repo, the `ios` label for Swift-client
            gaps, no assignee). Record each filed issue number in your report — do
            NOT merely describe a gap and move on. (Filing uses `gh`, which reads
            GH_TOKEN below; that token must have issues:write on the target repo.)
          - Do NOT run `git commit`, `git push`, `git checkout -b`, `git merge`,
            or `gh pr create`/`gh pr merge`. Leave every change in the working
            tree; the workflow opens the pull request. This also means you do NOT
            perform the skill's Step 0.5 main→next drain — that step is
            interactive-only and is a direct push; here you only open a PR.
          - Finish by writing your complete disposition report (the per-commit
            table plus any drafted larger-change items and the parity issues you
            filed) to `.docs-next-sync-report.md` at the repo root. If the pass
            made no doc changes, say so there and reset the submodules so the tree
            is clean.
          PROMPT

          # Append the (untrusted) payload context as plain data.
          {
            echo
            echo "Triggering nightly-release context (a hint only; the skill re-derives the authoritative diff):"
            echo "- Submodule: ${SUBMODULE:-js-bao-wss}"
            echo "- Source release issue: ${SUBMODULE:-js-bao-wss}#${ISSUE:-unknown} ${URL:-}"
            echo "- Release report (\"What shipped\" etc.):"
            echo "${NOTES:-(none)}"
          } >> /tmp/prompt.txt

          set +e
          timeout 50m claude -p "$(cat /tmp/prompt.txt)" \
            --model sonnet \
            --permission-mode bypassPermissions \
            --output-format json \
            > /tmp/claude_out.json 2> /tmp/claude_err.log
          code=$?
          set -e

          echo "claude exit code: $code"
          echo "----- stderr (tail) -----"; tail -40 /tmp/claude_err.log || true
          if jq -e . /tmp/claude_out.json >/dev/null 2>&1; then
            echo "----- run stats -----"
            jq -r '"is_error=\(.is_error)  num_turns=\(.num_turns)  cost_usd=\(.total_cost_usd)  duration_ms=\(.duration_ms)"' /tmp/claude_out.json || true
            echo "::group::Agent final message (.result)"
            jq -r '.result // "(no result field)"' /tmp/claude_out.json || true
            echo "::endgroup::"
          else
            echo "----- raw stdout (tail) -----"; tail -40 /tmp/claude_out.json || true
          fi

          if [ "$code" -ne 0 ]; then
            echo "::error::Claude Code CLI exited $code"
            exit "$code"
          fi
          if jq -e '.is_error == true' /tmp/claude_out.json >/dev/null 2>&1; then
            echo "::error::Claude reported is_error=true"
            exit 1
          fi

      - name: Read agent report
        if: steps.scan.outputs.has_work == 'true'
        id: report
        run: |
          if [ -f .docs-next-sync-report.md ]; then
            echo "::group::Disposition report (.docs-next-sync-report.md)"
            cat .docs-next-sync-report.md
            echo "::endgroup::"
            { echo "body<<REPORT_EOF"; cat .docs-next-sync-report.md; echo "REPORT_EOF"; } >> "$GITHUB_OUTPUT"
            rm -f .docs-next-sync-report.md
          else
            echo "No .docs-next-sync-report.md was written by the agent — see the agent final message above."
            echo "body=The agent produced no report file. Review the run logs (agent final message)." >> "$GITHUB_OUTPUT"
          fi

      - name: Detect changes
        if: steps.scan.outputs.has_work == 'true'
        id: diff
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request into next
        if: steps.scan.outputs.has_work == 'true' && steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.DOCS_REPO_PAT }}
          base: next
          branch: docs-next-sync/auto-${{ github.run_number }}
          delete-branch: true
          commit-message: |
            docs-next-sync: true next against ${{ steps.ctx.outputs.submodule }} (automated)
          title: "docs-next-sync: ${{ steps.ctx.outputs.submodule }} changes (automated)"
          body: |
            Automated `docs-next-sync` pass against the library main tips, triggered by the nightly release ${{ steps.ctx.outputs.submodule }}#${{ steps.ctx.outputs.issue }}.

            ${{ steps.report.outputs.body }}

            ---
            Review the doc changes and the disposition above, then merge into `next`. Publishing to `main` happens separately at a production release.

            > Generated unattended by the Claude Code CLI. Verify facts against source before merging.

      - name: Run summary
        if: always()
        run: |
          if [ "${{ steps.scan.outputs.has_work }}" != "true" ]; then
            echo "## docs-next-sync: nothing to do (no new library commits)" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
            echo "## docs-next-sync opened a PR into \`next\`" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## docs-next-sync: triaged changes, no doc edits needed" >> "$GITHUB_STEP_SUMMARY"
          fi
