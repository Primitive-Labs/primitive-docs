# Docs issue-sweep (agent automation, weekly)
#
# Runs the project's docs-issue-sweep skill UNATTENDED once a week: triages
# every open primitive-docs issue and implements the actionable ones, each on
# its own `issue-sweep/auto-<NN>-*` branch PR'd into `next`. The nightly tier
# (docs-next-sync.yml) picks up upstream-keyed issues as the libraries move;
# this tier drains the rest of the backlog — doc-content fixes, repo tooling,
# and anything a human filed by hand.
#
# Unlike the nightly (where the workflow commits the tree and opens one
# rolling PR), a sweep produces one PR per issue, so the AGENT pushes its own
# branches and opens its own PRs — under the naming and base-branch rules in
# the skill's "Unattended mode (CI)" section. It never merges anything and
# never closes an issue (closure happens when a PR merges, via
# close-issues-on-next-merge.yml, or by a human accepting a proposed-moot
# comment).
#
# NOTE: scheduled workflows run from the default branch (main); the work
# happens on a checkout of `next`.
#
# Secrets used (already configured in this repo):
#   ANTHROPIC_API_KEY — Claude Code CLI auth
#   DOCS_REPO_PAT     — checkout + private submodule auth + `gh` (triage,
#                       pushing issue branches, opening PRs, commenting on
#                       issues)

name: Docs Issue-Sweep (agent, weekly)

on:
  schedule:
    - cron: '0 14 * * 1' # Mondays 14:00 UTC

  # Manual trigger for testing / an on-demand sweep.
  workflow_dispatch: {}

# One sweep at a time; queue rather than cancel.
concurrency:
  group: docs-issue-sweep
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout primitive-docs (next)
        uses: actions/checkout@v5
        with:
          ref: next
          token: ${{ secrets.DOCS_REPO_PAT }}
          fetch-depth: 0

      - name: Configure git auth for private submodules
        run: |
          git config --global url."https://x-access-token:${{ secrets.DOCS_REPO_PAT }}@github.com/".insteadOf "https://github.com/"
          git config --global user.email "docs-bot@primitivelabs.com"
          git config --global user.name "primitive-docs-bot"

      - name: Initialize submodules at their pinned SHAs
        # Pinned on purpose: issue fixes validate against the sources as
        # currently stamped — moving the submodules is docs-next-sync's job.
        run: git submodule update --init --recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Check for an open backlog
        # Cheap gate: skip the Claude run entirely when the tracker is empty.
        id: gate
        env:
          GH_TOKEN: ${{ secrets.DOCS_REPO_PAT }}
        run: |
          COUNT="$(gh issue list --state open --limit 1 --json number --jq 'length')"
          if [ "${COUNT:-0}" -gt 0 ]; then
            echo "has_work=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_work=false" >> "$GITHUB_OUTPUT"
            echo "## docs-issue-sweep: backlog empty — nothing to sweep" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Run docs-issue-sweep with Claude Code CLI
        if: steps.gate.outputs.has_work == 'true'
        id: claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.DOCS_REPO_PAT }}
        run: |
          # Pinned: a bad CLI release must not break the weekly tier. Bump deliberately.
          npm install -g @anthropic-ai/claude-code@2.1.199

          # Static instructions (quoted heredoc → no shell interpolation).
          cat > /tmp/prompt.txt <<'PROMPT'
          You are running UNATTENDED in CI on the `next` branch of
          primitive-docs, on the weekly docs issue-sweep.

          Your job: use the project's docs-issue-sweep skill to triage every
          open issue in this repo and implement the actionable ones, each as
          its own pull request into `next`. Begin now by invoking the
          docs-issue-sweep skill (the `/docs-issue-sweep` command) and carry
          it to completion.

          The skill's "Unattended mode (CI)" section governs this run — read
          it first and follow it exactly. Hard boundaries (the skill section
          elaborates; these are absolute):
          - Never ask a question or wait for input. There is no triage
            checkpoint: proceed from triage straight to implementation and
            record the triage table in your report instead.
          - You MAY create branches, commit, push, and open PRs — but ONLY
            branches named `issue-sweep/auto-<issue-number>-<slug>`, ONLY PRs
            with base `next`. You must NEVER merge a PR and NEVER push to
            `next` or `main` directly.
          - Never close an issue. Propose moot closures as a comment on the
            issue with the evidence, and record them in the report.
          - Full validation before each PR opens, per the skill. A branch
            that cannot reach green gates gets NO pull request — record it as
            blocked instead.
          - Finish by writing your complete disposition report (covering
            EVERY open issue) to `.docs-issue-sweep-report.md` at the repo
            root, on `next`'s working tree (it is printed by the workflow,
            not committed).
          PROMPT

          # Sonnet: issue fixes are scoped, gate-validated, and human-reviewed
          # on their PRs — same cost posture as the nightly tier. The publish
          # tier (receive-production-release.yml) stays on Opus.
          set +e
          timeout 100m claude -p "$(cat /tmp/prompt.txt)" \
            --model sonnet \
            --permission-mode bypassPermissions \
            --output-format json \
            > /tmp/claude_out.json 2> /tmp/claude_err.log
          code=$?
          set -e

          echo "claude exit code: $code"
          echo "----- stderr (tail) -----"; tail -40 /tmp/claude_err.log || true
          if jq -e . /tmp/claude_out.json >/dev/null 2>&1; then
            echo "----- run stats -----"
            jq -r '"is_error=\(.is_error)  num_turns=\(.num_turns)  cost_usd=\(.total_cost_usd)  duration_ms=\(.duration_ms)"' /tmp/claude_out.json || true
            echo "::group::Agent final message (.result)"
            jq -r '.result // "(no result field)"' /tmp/claude_out.json || true
            echo "::endgroup::"
          else
            echo "----- raw stdout (tail) -----"; tail -40 /tmp/claude_out.json || true
          fi

          if [ "$code" -ne 0 ]; then
            echo "::error::Claude Code CLI exited $code"
            exit "$code"
          fi
          if jq -e '.is_error == true' /tmp/claude_out.json >/dev/null 2>&1; then
            echo "::error::Claude reported is_error=true"
            exit 1
          fi

      - name: Read agent report
        if: steps.gate.outputs.has_work == 'true'
        run: |
          if [ -f .docs-issue-sweep-report.md ]; then
            echo "::group::Disposition report (.docs-issue-sweep-report.md)"
            cat .docs-issue-sweep-report.md
            echo "::endgroup::"
            { echo "## docs-issue-sweep report"; echo; cat .docs-issue-sweep-report.md; } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::No .docs-issue-sweep-report.md was written by the agent — see the agent final message above."
            echo "## docs-issue-sweep: agent produced no report file — review the run logs" >> "$GITHUB_STEP_SUMMARY"
          fi
